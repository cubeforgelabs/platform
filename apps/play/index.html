<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Play, remix, and publish browser games built with CubeForge. Free and open source." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="CubeForge Play" />
    <meta property="og:description" content="Play, remix, and publish browser games built with CubeForge. Free and open source." />
    <meta property="og:image" content="https://play.cubeforge.dev/og-image.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <title>CubeForge Play</title>
    <script>
      (function(){
        try {
          var t = localStorage.getItem('cf-theme');
          if (t === 'light') document.documentElement.setAttribute('data-theme','light');
          else if (!t && window.matchMedia('(prefers-color-scheme: light)').matches)
            document.documentElement.setAttribute('data-theme','light');
        } catch(e){}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
